<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">

  <!-- Outer circle -->
  <circle cx="12" cy="13" r="7.5" fill="none" stroke="#2B7A78" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Top knob -->
  <rect x="10" y="3.2" width="4" height="2.4" rx="0.9"
        fill="none" stroke="#2B7A78" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small connector -->
  <line x1="12" y1="5.6" x2="12" y2="7"
        stroke="#2B7A78" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small accent at side -->
  <line x1="17.8" y1="9.3" x2="19.2" y2="8.5"
        stroke="#2B7A78" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 24 label -->
  <text x="12" y="16" text-anchor="middle"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="6" fill="#2B7A78" font-weight="600">24</text>
</svg>